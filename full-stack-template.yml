  ## EC2 Instance with a custom security group
  ## and a larger root instance device
  ## and an externally created EBS volume attached
---
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
  ServerSubnet:
    Description: Select the Subnet mask as per your requirement
    Type: AWS::EC2::Subnet::Id
  SSHSecurityGroup:
    Description: SecurityGroup that allows access to the instance via SSH
    Type: AWS::EC2::SecurityGroup::Id
Resources:
  TestInstance: 
    Properties: 
      BlockDeviceMappings: 
        - 
          DeviceName: /dev/sda1
          Ebs: 
            VolumeSize: 24
            VolumeType: gp2
      ImageId: ami-08e4e35cccc6189f4
      InstanceType: t2.micro
      KeyName: !Ref KeyName  
      Monitoring: true
      SecurityGroupIds: 
        - !Ref SSHSecurityGroup 
      SubnetId: !Ref ServerSubnet
      Tags: 
        - 
          Key: Name
          Value: Test-server-own
    Type: "AWS::EC2::Instance"


### Create a S3 Bucket
  S3Bucket:
    DeletionPolicy: Retain
    Type: 'AWS::S3::Bucket'
    Description: Creating Amazon S3 bucket from CloudFormation
    Properties:
      BucketName: resourcestoragee
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled


### Create a Lambda Function 
  testfunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: testfunction
      Code:
        ZipFile:
          Fn::Join:
          - "\n"
          - - 'def lambda_handler(event, context):'
            - "    print('THIS IS LAMBDA CREATED FROM CloudFormation')"
            - "    return 'success'"
      Description: Used to Test job
      Handler: index.lambda_handler
      Role: arn:aws:iam::926196785461:role/service-role/Test1-role-h81s7jkz
      Runtime: python3.8
      Timeout: 120


### Create a RDS Instance in the stack
  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: TestDB      
      AllocatedStorage: '20'
      DBInstanceClass: db.m5d.large
      Engine: MySQL
      MasterUsername: master
      MasterUserPassword: Test12356
    DeletionPolicy: Snapshot

