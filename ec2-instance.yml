  ## EC2 Instance with a custom security group
  ## and a larger root instance device
  ## and an externally created EBS volume attached
---
Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access to the instance
    Type: AWS::EC2::KeyPair::KeyName
  ServerSubnet:
    Description: Select the Subnet mask as per your requirement
    Type: AWS::EC2::Subnet::Id
  SSHSecurityGroup:
    Description: SecurityGroup that allows access to the instance via SSH
    Type: AWS::EC2::SecurityGroup::Id
  
Resources:
  TestInstance: 
    Properties: 
      BlockDeviceMappings: 
        - 
          DeviceName: /dev/sda1
          Ebs: 
            VolumeSize: 24
            VolumeType: gp2
      ImageId: ami-08e4e35cccc6189f4
      InstanceType: t2.micro
      KeyName: !Ref KeyName  
      Monitoring: true
      SecurityGroupIds: 
        - !Ref SSHSecurityGroup 
      SubnetId: !Ref ServerSubnet
      Tags: 
        - 
          Key: Name
          Value: Test-server-own
    Type: "AWS::EC2::Instance"
